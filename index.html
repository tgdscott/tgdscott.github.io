<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=0, viewport-fit=cover">
    <title>Savvy Word Challenge</title>
    <style>
        :root {
            --bg: #121213;
            --correct: #6aaa64;
            --present: #c9b458;
            --absent: #3a3a3c;
            --border: #3a3a3c;
            --text: #ffffff;
            --key-bg: #818384;
        }
        * { box-sizing: border-box; touch-action: manipulation; }
        
        body { 
            background: var(--bg); color: var(--text); 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0; padding: 0;
            height: 100dvh; 
            display: flex; flex-direction: column;
            overflow: hidden;
        }
        
        /* MAKER / ADMIN UI */
        #maker-ui { 
            width: 100%; max-width: 400px; text-align: center; 
            margin: auto; padding: 20px; 
            display: flex; flex-direction: column; gap: 10px;
        }
        .admin-header { margin-bottom: 10px; }
        .admin-header h2 { margin: 0; font-size: 1.5rem; }
        .version-tag { font-size: 0.7rem; color: #565758; margin-top: 5px; letter-spacing: 1px; }

        input { 
            display: block; width: 100%; padding: 14px; 
            background: #272729; border: 1px solid var(--border); 
            color: white; border-radius: 6px; text-transform: uppercase; font-size: 16px; 
        }
        
        /* GAME UI */
        #game-ui { 
            display: flex; flex-direction: column; 
            height: 100%; width: 100%; max-width: 500px; 
            margin: 0 auto;
            padding-bottom: env(safe-area-inset-bottom);
        }

        header {
            height: 60px; display: flex; align-items: center; justify-content: center;
            font-weight: bold; color: #818384; text-transform: uppercase; letter-spacing: 1px;
        }

        /* BOARD AREA */
        #board-container {
            flex-grow: 1; display: flex; align-items: center; justify-content: center;
            padding: 10px; overflow: hidden;
        }
        #board { display: flex; flex-direction: column; gap: 5px; }
        .row { display: flex; gap: 5px; justify-content: center; }
        .tile { 
            width: 12vw; height: 12vw; max-width: 55px; max-height: 55px;
            border: 2px solid var(--border); 
            display: flex; align-items: center; justify-content: center; 
            font-size: 1.8rem; font-weight: bold; text-transform: uppercase; user-select: none;
        }
        .tile.correct { background: var(--correct); border-color: var(--correct); }
        .tile.present { background: var(--present); border-color: var(--present); }
        .tile.absent { background: var(--absent); border-color: var(--absent); }

        /* KEYBOARD AREA */
        #keyboard { padding: 0 8px 15px 8px; }
        .kb-row { display: flex; justify-content: center; gap: 6px; margin-bottom: 8px; width: 100%; }
        .key { 
            background: var(--key-bg); color: white; border: 0; border-radius: 4px; 
            height: 58px; flex: 1; display: flex; align-items: center; justify-content: center; 
            font-weight: bold; font-size: 1.1rem; cursor: pointer; user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .key.correct { background: var(--correct); }
        .key.present { background: var(--present); }
        .key.absent { background: var(--absent); opacity: 0.4; }
        .key.large { flex: 1.5; font-size: 0.75rem; }

        /* INTERMISSION MODAL */
        #modal-overlay { 
            position: fixed; inset: 0; background: rgba(0,0,0,0.95); 
            display: flex; align-items: center; justify-content: center; z-index: 100;
        }
        .modal-content { background: #272729; padding: 30px; border-radius: 12px; width: 85%; max-width: 350px; text-align: center; border: 1px solid var(--border); }
        .clue-list { margin: 25px 0; font-size: 1.5rem; color: var(--correct); font-weight: bold; line-height: 1.8; text-transform: uppercase; }
        
        .hidden { display: none !important; }
        .primary-btn { background: var(--correct); color: white; border: none; padding: 16px; width: 100%; font-weight: bold; border-radius: 6px; cursor: pointer; font-size: 1rem; }
    </style>
</head>
<body>

    <!-- MAKER / ADMIN VIEW -->
    <div id="maker-ui">
        <div class="admin-header">
            <h2>Savvy Maker</h2>
            <div class="version-tag">BUILD V4.0</div>
        </div>
        
        <input type="text" id="w1" placeholder="Word 1" maxlength="8">
        <input type="text" id="w2" placeholder="Word 2" maxlength="8">
        <input type="text" id="w3" placeholder="Word 3" maxlength="8">
        <input type="text" id="w4" placeholder="Word 4" maxlength="8">
        <input type="text" id="w5" placeholder="The Subtext (Final)" maxlength="8">
        
        <button class="primary-btn" onclick="generateLink()">CREATE PUZZLE LINK</button>
        
        <div id="link-display" class="hidden" style="margin-top:10px;">
            <p style="font-size: 0.9rem; color: #818384;">Copy this link to share:</p>
            <textarea id="share-url" readonly style="width:100%; height: 80px; background:#121213; color:var(--correct); border:1px solid var(--border); padding:10px; border-radius:6px; font-size:11px; font-family: monospace;"></textarea>
        </div>
    </div>

    <!-- GAME VIEW -->
    <div id="game-ui" class="hidden">
        <header id="round-text">ROUND 1 / 5</header>
        <div id="board-container">
            <div id="board"></div>
        </div>
        <div id="keyboard"></div>
    </div>

    <!-- MODAL VIEW -->
    <div id="modal-overlay" class="hidden">
        <div class="modal-content">
            <h3 style="margin:0; color: #818384; font-size: 0.9rem; letter-spacing: 1px;">CLUES FOUND</h3>
            <div id="intermission-clues" class="clue-list"></div>
            <p style="margin-bottom: 25px; font-size: 1.1rem;">Solve the Subtext.</p>
            <button class="primary-btn" onclick="closeIntermission()">CONTINUE</button>
        </div>
    </div>

<script>
    let words = [];
    let currentRound = 0;
    let currentGuess = "";
    let guesses = [];
    let keyStates = {};
    const MAX_GUESSES = 6;

    const ROWS = [
        ['Q','W','E','R','T','Y','U','I','O','P'],
        ['A','S','D','F','G','H','J','K','L'],
        ['ENTER', 'Z','X','C','V','B','N','M', 'DEL']
    ];

    window.onload = () => {
        const hash = window.location.hash.substring(1);
        if (hash) {
            try {
                words = JSON.parse(atob(hash));
                document.getElementById('maker-ui').classList.add('hidden');
                document.getElementById('game-ui').classList.remove('hidden');
                startRound();
            } catch (e) { alert("Invalid Puzzle Link."); }
        }
    };

    function generateLink() {
        const inputs = [1,2,3,4,5].map(i => document.getElementById(`w${i}`).value.trim().toUpperCase());
        if (inputs.some(w => w.length < 1)) return alert("Please fill in all 5 words.");
        const encoded = btoa(JSON.stringify(inputs));
        const url = window.location.origin + window.location.pathname + "#" + encoded;
        document.getElementById('share-url').value = url;
        document.getElementById('link-display').classList.remove('hidden');
    }

    function startRound() {
        guesses = [];
        currentGuess = "";
        keyStates = {}; 
        document.getElementById('round-text').innerText = currentRound < 4 ? `ROUND ${currentRound + 1} / 5` : "THE SUBTEXT";
        renderBoard();
        renderKeyboard();
    }

    function handleInput(key) {
        const target = words[currentRound];
        if (key === "ENTER") {
            if (currentGuess.length === target.length) submitGuess();
        } else if (key === "DEL" || key === "BACKSPACE") {
            currentGuess = currentGuess.slice(0, -1);
        } else if (/^[A-Z]$/.test(key)) {
            if (currentGuess.length < target.length) currentGuess += key;
        }
        renderBoard();
    }

    function submitGuess() {
        const target = words[currentRound];
        
        currentGuess.split('').forEach((letter, i) => {
            if (target[i] === letter) keyStates[letter] = 'correct';
            else if (target.includes(letter) && keyStates[letter] !== 'correct') keyStates[letter] = 'present';
            else if (!keyStates[letter]) keyStates[letter] = 'absent';
        });

        guesses.push(currentGuess);
        const win = currentGuess === target;
        currentGuess = "";

        if (win) {
            setTimeout(() => {
                if (currentRound === 3) showIntermission();
                else if (currentRound < 4) { currentRound++; startRound(); }
                else alert("SOLVED! You found the Subtext.");
            }, 300);
        } else if (guesses.length === MAX_GUESSES) {
            alert("Game Over. The word was: " + target);
        }
        renderBoard();
        renderKeyboard();
    }

    function showIntermission() {
        document.getElementById('intermission-clues').innerHTML = words.slice(0, 4).join("<br>");
        document.getElementById('modal-overlay').classList.remove('hidden');
    }

    function closeIntermission() {
        document.getElementById('modal-overlay').classList.add('hidden');
        currentRound = 4;
        startRound();
    }

    function renderBoard() {
        const board = document.getElementById('board');
        board.innerHTML = "";
        const targetLen = words[currentRound].length;
        for (let i = 0; i < MAX_GUESSES; i++) {
            const row = document.createElement('div');
            row.className = 'row';
            const val = guesses[i] || (i === guesses.length ? currentGuess : "");
            for (let j = 0; j < targetLen; j++) {
                const tile = document.createElement('div');
                tile.className = 'tile';
                if (guesses[i]) {
                    const letter = guesses[i][j];
                    if (words[currentRound][j] === letter) tile.classList.add('correct');
                    else if (words[currentRound].includes(letter)) tile.classList.add('present');
                    else tile.classList.add('absent');
                }
                tile.innerText = val[j] || "";
                row.appendChild(tile);
            }
            board.appendChild(row);
        }
    }

    function renderKeyboard() {
        const kb = document.getElementById('keyboard');
        kb.innerHTML = "";
        ROWS.forEach(rowArr => {
            const rowDiv = document.createElement('div');
            rowDiv.className = 'kb-row';
            rowArr.forEach(key => {
                const btn = document.createElement('button');
                btn.className = 'key' + (key.length > 1 ? ' large' : '');
                if (keyStates[key]) btn.classList.add(keyStates[key]);
                btn.innerText = key;
                btn.onclick = (e) => { e.preventDefault(); handleInput(key); };
                rowDiv.appendChild(btn);
            });
            kb.appendChild(rowDiv);
        });
    }

    window.onkeydown = (e) => {
        if (document.getElementById('game-ui').classList.contains('hidden')) return;
        const key = e.key.toUpperCase();
        handleInput(key === "BACKSPACE" ? "DEL" : key);
    };
</script>
</body>
</html>
